<footer class="site-footer">
  <div class="footer-grid">
    <div>
      <p class="footer-title">{{ site.title }}</p>
      <p>{{ site.description }}</p>
    </div>
    <div class="footer-links">
      <a href="{{ '/archive/' | relative_url }}">文章归档</a>
      <a href="{{ '/tags/' | relative_url }}">主题标签</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS 订阅</a>
    </div>
  </div>
  <p class="copyright">© {{ site.time | date: "%Y" }} {{ site.author.name | default: site.title }}. Built with Jekyll and GitHub Pages.</p>
</footer>
